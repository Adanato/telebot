# Course Scout Configuration

global:
  lookback_days: 1
  report_format: "pdf"
  timezone: "America/New_York"
  window_mode: "rolling"

# Default agent config (overridable per task)
agent_defaults:
  summarizer_model: "claude-sonnet-4-6"
  chunk_size: 10000  # no within-topic slicing — one call sees the whole topic's time window
  max_messages: 100
  thinking: "adaptive"
  effort: "medium"

# ── Prompt Templates ──
# Referenced by tasks via system_prompt field.
# Tasks without system_prompt use the default prompt in agents.py.

prompts:
  course_requests: |
    Extract items from a REQUEST channel. EVERY item MUST be category=request.
    This channel's sole purpose is requests — do not emit file, course, discussion,
    or announcement items. If someone shares a download link in reply to a request,
    the REQUEST itself becomes FULFILLED (still category=request).

    OUTPUT SCHEMA (single allowed category):
    - category=request: a requested course/resource. Always.
      status=FULFILLED  → someone replied with an actual download link (mega, drive, pan baidu, t.me file, .zip, torrent)
      status=DISCUSSING → reply is a storefront link, in-progress, or community searching
      status=UNFULFILLED → no reply, or explicitly unavailable

    FIELDS: instructor, platform, status. Preserve download passwords if a link is shared.
    Description: 1 line — what the course covers. No narrative.

    RULES:
    - msg_ids required for every item
    - Do not hallucinate links
    - Do not emit non-request categories under any circumstance
    - Return valid JSON matching the schema

  file_sharing: |
    Extract items from a FILE SHARING channel. Primary output is category=file
    (actual downloads). Occasional category=discussion for access help, format
    questions, or extraction problems. DO NOT emit category=request — that's for
    request channels; re-upload asks are noise here.

    OUTPUT SCHEMA (two allowed categories):
    - category=file: shared download.
      FIELDS: instructor, platform (Baidu Pan, Quark Pan, Mega, Telegram, Google Drive),
              password (PRESERVE EXACTLY), status=FULFILLED
    - category=discussion: access help, format questions, extraction troubleshooting.
      FIELDS: instructor (if about a specific artist/course)

    Translate Chinese/Korean/Japanese titles to English, keep original in parentheses.
    Note: file format, split archives, video quality, subtitle availability.

    RULES:
    - msg_ids required for every item
    - Preserve ALL passwords and access codes exactly
    - Do not hallucinate links
    - Do not emit request, course, or announcement categories
    - Return valid JSON matching the schema

  language_chat: |
    Extract items from MULTILINGUAL art community chat.
    Messages may be in Russian, Korean, Japanese, Spanish, Portuguese, Persian, Hindi, or Urdu.
    Telegraphic style — no narrative, just structured data. Translate everything to English.

    DECISION TREE (apply in this exact order — first match wins):

    1. Does the message ASK for something the user does not have?
       → category=request. Set status=UNFULFILLED unless someone replied with a download link.
       Examples: "anyone got X?", "looking for X", "where can I find X?", "needs X please"

    2. Did someone share an actual download/share LINK (mega/drive/baidu/t.me file/.zip)?
       → category=file. Set status=FULFILLED.

    3. Is the message a course REVIEW with verdict (good/bad/quality assessment)?
       → category=course. Set instructor, platform.
       Examples: "Krenz is great for color", "X course is too slow", "Y is overrated"
       NOT just naming a course in passing — must contain a judgment.

    4. Is the thread a TECHNIQUE discussion, tool comparison, or workflow tip?
       → category=discussion. Examples: "use AO layer to test grayscale",
       "Sai vs CSP for brushes", "how to render skin"

    5. Is it news, event, or new release announcement?
       → category=announcement.

    6. Otherwise → skip (greeting, meme, off-topic gaming, social chat).

    DISAMBIGUATION:
    - "X is a great course" alone = category=course (review)
    - "Does anyone have X?" with reply "X is great" = category=request, NOT course
      (the original act is asking, not reviewing)
    - "Here's a tip from X course" = category=discussion (technique), not course
    - Bare course name in passing with no verdict = SKIP (not actionable)

    RULES:
    - msg_ids required for every item
    - Preserve original course/artist names alongside translations
    - Do not hallucinate links
    - Return valid JSON matching the schema

  discussion_lounge: |
    Extract items from a DISCUSSION lounge. Primary output is category=discussion
    (technique breakdowns, tool comparisons, style analysis). Also allowed:
    category=course (review/recommendation mentioned) and category=file (shared
    resource). DO NOT emit category=request — unanswered questions are noise;
    extract only if the thread produced a real answer/resource.

    OUTPUT SCHEMA (three allowed categories):
    - category=discussion: technique breakdown, tool comparison, style analysis.
      FIELDS: instructor (if about a specific artist/method)
    - category=course: course review or recommendation in conversation.
      FIELDS: instructor, platform, status (DISCUSSING/FULFILLED)
    - category=file: shared resource (spreadsheet, reference, brush pack).
      FIELDS: platform, password, status=FULFILLED

    Skip: casual greetings, memes, reactions without substance, pure social chat.

    RULES:
    - msg_ids required for every item
    - Preserve shared reference URLs exactly
    - Do not hallucinate links
    - Do not emit request or announcement categories
    - Return valid JSON matching the schema

  course_review: |
    Extract COURSE REVIEWS from art community Telegram messages.
    Telegraphic style — no narrative, just structured data.

    OUTPUT SCHEMA (two allowed categories):
    - category=course: the review itself. FIELDS: instructor, platform.
      Description: verdict, skill level, key takeaways.
    - category=discussion: debate about course quality. FIELDS: instructor.

    RULES:
    - msg_ids required for every item
    - Do not hallucinate links
    - Do not emit file, request, or announcement categories
    - Return valid JSON matching the schema

