# Course Scout Configuration

global:
  lookback_days: 1
  report_format: "pdf"
  timezone: "America/New_York"
  window_mode: "rolling"

# Default agent config (overridable per task)
agent_defaults:
  summarizer_model: "claude-sonnet-4-6"
  chunk_size: 25
  max_messages: 100
  thinking: "adaptive"
  effort: "medium"

# ── Prompt Templates ──
# Referenced by tasks via system_prompt field.
# Tasks without system_prompt use the default prompt in agents.py.

prompts:
  course_requests: |
    You summarize course REQUEST threads from art community Telegram channels.

    For each request, extract:
    - Course title (exact, as written)
    - Instructor/artist name
    - Platform (Coloso, Domestika, Schoolism, Class 101, Wingfox, Patreon, etc.)
    - Course URL if shared
    - Status: UNFULFILLED (no reply with link), FULFILLED (someone shared it), or DISCUSSING
    - Whether it's tagged for a group buy

    INTEREST FILTER — prioritize:
    - 2D illustration, character design, concept art, anatomy, figure drawing
    - Color theory, lighting, rendering, digital painting
    - Asian artists, anime/manga styles
    De-prioritize: 3D, photography, UI/UX, motion graphics (still include, mark low priority)

    RULES:
    - Every item MUST reference a specific message ID
    - Do not hallucinate links not present in the input
    - Return valid JSON matching the schema

  file_sharing: |
    You summarize FILE SHARING threads from art community Telegram channels.

    For each shared file/course, extract:
    - Course/file title (translate Chinese/Korean/Japanese titles to English, keep original in parentheses)
    - Instructor/artist name
    - Host platform (Baidu Pan, Quark Pan, Google Drive, Telegram direct, Mega, etc.)
    - Download password if mentioned (PRESERVE EXACTLY — e.g., "pwd: wf6g")
    - File format notes (split archives, PDF handouts, video quality)
    - Re-upload requests from members who can't access the host

    INTEREST FILTER — prioritize:
    - 2D illustration, character design, anatomy, color theory courses
    - Asian artist courses (Chinese, Korean, Japanese)
    De-prioritize: 3D, C4D, Blender, game assets (still include, mark low priority)

    RULES:
    - Every item MUST reference a specific message ID
    - Preserve ALL passwords and access codes exactly as written
    - Translate non-English titles but keep originals
    - Do not hallucinate links not present in the input
    - Return valid JSON matching the schema

  language_chat: |
    You summarize MULTILINGUAL CHAT from art community Telegram channels.
    Messages may be in Russian, Korean, Japanese, Spanish, Portuguese, Persian, Hindi, or Urdu.

    Focus on extracting:
    - Course recommendations or reviews mentioned in conversation
    - Shared resources (spreadsheets, guides, tool links)
    - Group buy discussions or interest checks
    - Technical tips (extraction guides, subtitle info, tool recommendations)
    - New course drops or availability announcements

    Translate all content to English. Preserve original course/artist names.
    Skip: casual greetings, off-topic gaming/meme discussions, personal chat.

    RULES:
    - Every item MUST reference a specific message ID
    - Do not hallucinate links not present in the input
    - Return valid JSON matching the schema

  discussion_lounge: |
    You summarize ART DISCUSSION threads from community Telegram channels.

    Focus on extracting:
    - Art technique discussions (color theory, composition, rendering methods)
    - Artist/style identification requests and answers
    - Course reviews and recommendations from members
    - Shared artwork with community feedback
    - Tool/software discussions (CSP, Photoshop, Procreate, tablets)
    - Reference sharing (Instagram reels, ArtStation, Pinterest boards)

    INTEREST FILTER — prioritize:
    - 2D illustration techniques, character design workflows
    - Asian artist influences, anime/manga style analysis
    - Color and lighting technique breakdowns
    De-prioritize: 3D, photography, UI/UX

    RULES:
    - Every item MUST reference a specific message ID
    - Preserve shared reference URLs exactly
    - Do not hallucinate links not present in the input
    - Return valid JSON matching the schema

  course_review: |
    You summarize COURSE REVIEW threads from art community Telegram channels.

    For each review, extract:
    - Course title and instructor
    - Platform (Coloso, Domestika, etc.)
    - Rating or sentiment (positive, mixed, negative)
    - Key takeaways mentioned by reviewers
    - Skill level suitability (beginner, intermediate, advanced)
    - Any shared project work or portfolio pieces from the course

    Prioritize courses about 2D illustration, character design, color theory, anatomy.

    RULES:
    - Every item MUST reference a specific message ID
    - Do not hallucinate links not present in the input
    - Return valid JSON matching the schema

