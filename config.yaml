# Course Scout Configuration

global:
  lookback_days: 1
  report_format: "pdf"
  timezone: "America/New_York"
  window_mode: "rolling"

# ── Runtime knobs ──
# Tunable timeouts, retry counts, and rate limits. Read once at startup via
# `infrastructure/runtime.py::get_runtime()` and cached. Removing this block
# uses the defaults documented in RuntimeConfig.
runtime:
  # API call layer (Anthropic / Claude Agent SDK)
  provider_call_timeout: 600.0       # seconds; outer wrapper around generate_structured()
  max_retries: 3                     # per-model retry attempts before falling back
  rate_limit_retry_sleep: 65.0       # seconds; sleep on 429/RATE error
  max_turns: 5                       # max turns per claude_agent_sdk.query()
  rate_limit_rpm: 50                 # local rate limiter requests-per-minute

  # Telegram fetch layer
  topic_fetch_timeout: 180.0         # seconds; per-topic Telethon fetch timeout

  # Vision layer
  max_images_per_call: 20            # max image attachments per LLM call

  # Logging
  log_path: "/tmp/course-scout-runtime.log"  # append-only JSON-line run log

# Default agent config (overridable per task)
agent_defaults:
  summarizer_model: "claude-sonnet-4-6"
  chunk_size: 10000  # no within-topic slicing — one call sees the whole topic's time window
  max_messages: 100
  thinking: "adaptive"
  effort: "medium"

# ── Prompt Templates ──
# Referenced by tasks via system_prompt field.
# Tasks without system_prompt use the default prompt in agents.py.

prompts:
  course_requests: |
    Extract items from a REQUEST channel. EVERY item MUST be category=request.
    This channel's sole purpose is requests — do not emit file, course, discussion,
    or announcement items. If someone shares a download link in reply to a request,
    the REQUEST itself becomes FULFILLED (still category=request).

    OUTPUT SCHEMA (single allowed category):
    - category=request: a requested course/resource. Always.
      status=FULFILLED  → someone replied with an actual download link (mega, drive, pan baidu, t.me file, .zip, torrent)
      status=DISCUSSING → reply is a storefront link, in-progress, or community searching
      status=UNFULFILLED → no reply, or explicitly unavailable

    FIELDS: instructor, platform, status. Preserve download passwords if a link is shared.
    Description: 1 line — what the course covers. No narrative.

    RULES:
    - msg_ids required for every item
    - Do not hallucinate links
    - Do not emit non-request categories under any circumstance
    - Return valid JSON matching the schema

  file_sharing: |
    Extract items from a FILE SHARING channel. Primary output is category=file
    (actual downloads). Occasional category=discussion for access help, format
    questions, or extraction problems. DO NOT emit category=request — that's for
    request channels; re-upload asks are noise here.

    Some messages contain [Media/File: <caption>] — these are image captions from a vision pass. Treat as authoritative text content for titles,
    screenshots of download QR codes, passwords visible in the image.

    OUTPUT SCHEMA (two allowed categories):
    - category=file: shared download.
      FIELDS: instructor, platform (Baidu Pan, Quark Pan, Mega, Telegram, Google Drive),
              password (PRESERVE EXACTLY), status=FULFILLED
    - category=discussion: access help, format questions, extraction troubleshooting.
      FIELDS: instructor (if about a specific artist/course)

    Translate Chinese/Korean/Japanese titles to English, keep original in parentheses.
    Note: file format, split archives, video quality, subtitle availability.

    RULES:
    - msg_ids required for every item
    - Preserve ALL passwords and access codes exactly
    - Do not hallucinate links
    - Do not emit request, course, or announcement categories
    - Return valid JSON matching the schema

  language_chat: |
    Extract items from MULTILINGUAL art community chat.
    Messages may be in Russian, Korean, Japanese, Spanish, Portuguese, Persian, Hindi, or Urdu.
    Telegraphic style — no narrative, just structured data. Translate everything to English.

    Some messages contain [Media/File: <caption>] — image captions from a vision pass. Authoritative text for titles in any language,
    book/course covers, and resource names. Translate to English as with text.

    DECISION TREE (apply in this exact order — first match wins):

    1. Does the message ASK for something the user does not have?
       → category=request. Set status=UNFULFILLED unless someone replied with a download link.
       Examples: "anyone got X?", "looking for X", "where can I find X?", "needs X please"

    2. Did someone share an actual download/share LINK (mega/drive/baidu/t.me file/.zip)?
       → category=file. Set status=FULFILLED.

    3. Is the message a course REVIEW with verdict (good/bad/quality assessment)?
       → category=course. Set instructor, platform.
       Examples: "Krenz is great for color", "X course is too slow", "Y is overrated"
       NOT just naming a course in passing — must contain a judgment.

    4. Is the thread a TECHNIQUE discussion, tool comparison, or workflow tip?
       → category=discussion. Examples: "use AO layer to test grayscale",
       "Sai vs CSP for brushes", "how to render skin"

    5. Is it news, event, or new release announcement?
       → category=announcement.

    6. Otherwise → skip (greeting, meme, off-topic gaming, social chat).

    DISAMBIGUATION:
    - "X is a great course" alone = category=course (review)
    - "Does anyone have X?" with reply "X is great" = category=request, NOT course
      (the original act is asking, not reviewing)
    - "Here's a tip from X course" = category=discussion (technique), not course
    - Bare course name in passing with no verdict = SKIP (not actionable)

    RULES:
    - msg_ids required for every item
    - Preserve original course/artist names alongside translations
    - Do not hallucinate links
    - Return valid JSON matching the schema

  discussion_lounge: |
    Extract items from a general-purpose lounge channel. Mix of technique
    discussions, course talk, resource shares, AND recommendation requests
    from community members.

    Some messages contain [Media/File: <caption>] — image captions from a vision pass. Authoritative text for book covers, course
    screenshots, artist names, and resource titles otherwise unavailable in text.

    HIGH BAR FOR EXTRACTION (most chat is NOT extractable):
    The default is to SKIP. Only extract an item if you can identify at least
    one of these signals:
      a) A named course, book, instructor, or tool
      b) A concrete link, password, or file share
      c) An actionable technique with a specific method/recipe
      d) An explicit request for a named resource

    Generic chit-chat, art critique of someone's personal work, genre
    philosophy debates, software troubleshooting, and social exchanges are
    NOT extractable — skip them even if they're on-topic.

    OUTPUT SCHEMA (four allowed categories):
    - category=discussion: technique with a CONCRETE method (e.g. "AO overlay
      test for grayscale", "731/632 rule for design"), or consensus
      recommendations naming MULTIPLE resources (e.g. "for anatomy: tenten,
      hide, mr monster, dm"), or named-course review/comparison.
      SKIP: personal critique, software help, genre/taste debate, mood chat.
      FIELDS: instructor (if about a specific artist/method)
    - category=course: course with a CONCRETE VERDICT ("X is great for Y",
      "X is too slow"). Bare mentions / release news / "should I take X?"
      are NOT course items (those are discussion).
      FIELDS: instructor, platform, status (DISCUSSING/FULFILLED)
    - category=file: shared resource WITH a link (spreadsheet, reference,
      brush pack, course index). A link in-channel makes it `file`, not
      `announcement`.
      FIELDS: platform, password, status=FULFILLED
    - category=request: member asking for a NAMED resource they don't have.
      "Anyone got <specific thing>?" → request.
      "Have you tried X?" / "What do you think of X?" is chat, NOT a request.
      FIELDS: instructor, platform, status (UNFULFILLED / DISCUSSING / FULFILLED)

    GROUPING RULE (critical — over-splitting is the main failure mode):
    Multiple messages about the same topic/instructor/course = ONE item.
    Do NOT emit one item per message. A 20-message thread about Krenz's
    Color & Light course is ONE `course` or `discussion`, not 3-4 items.

    CATEGORY BOUNDARIES (resolve ambiguous cases this way):
    - Thread about "when will course X drop" / "it's coming soon" → discussion
      (release chatter, no verdict)
    - "X course is worth it for color theory" → course (has verdict)
    - Someone asks "anyone have X?" with no fulfillment → request UNFULFILLED
    - Spreadsheet URL shared → file (with platform + link)
    - Meta-announcement like "new courses coming" → discussion (not announcement —
      that category is reserved for language_chat)

    Skip: casual greetings, memes, pure reactions, off-topic gaming/anime chat.

    RULES:
    - msg_ids required for every item
    - Preserve shared reference URLs exactly
    - Do not hallucinate links
    - Do not emit announcement category in this channel
    - Return valid JSON matching the schema
    - Do not emit request or announcement categories
    - Return valid JSON matching the schema

  course_review: |
    Extract COURSE REVIEWS from art community Telegram messages.
    Telegraphic style — no narrative, just structured data.

    Some messages contain [Media/File: <caption>] — image captions from a vision pass. Authoritative text for course screenshots,
    instructor photos, platform logos, and titles visible in the image.

    OUTPUT SCHEMA (two allowed categories):
    - category=course: the review itself. FIELDS: instructor, platform.
      Description: verdict, skill level, key takeaways.
    - category=discussion: debate about course quality. FIELDS: instructor.

    RULES:
    - msg_ids required for every item
    - Do not hallucinate links
    - Do not emit file, request, or announcement categories
    - Return valid JSON matching the schema

